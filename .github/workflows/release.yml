# Builds the plugin and publishes the Obsidian release assets when a version tag is
# pushed. The tag (e.g. `0.2.0`, no "v" prefix) must equal `version` in manifest.json.
# Maintainers only push the tag (see scripts/release.mjs) — GitHub does the building
# and asset upload, so assets can never drift from the tagged source.
name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fail if tag does not match manifest version
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$GITHUB_REF_NAME" != "$MANIFEST_VERSION" ]; then
            echo "Tag [$GITHUB_REF_NAME] != manifest version [$MANIFEST_VERSION]" >&2
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create GitHub release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            main.js manifest.json styles.css
